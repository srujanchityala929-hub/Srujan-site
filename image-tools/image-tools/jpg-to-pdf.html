<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image to PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- COMMON PROFESSIONAL CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <span>VYNTRIX</span> · Tools
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main">
  <div class="card">

    <h2>🖼️ JPG / JPEG / PNG to PDF</h2>

    <button id="pickBtn">Select Images</button>
    <input type="file" id="input" accept="image/*" multiple hidden>

    <div id="preview"></div>

    <button id="convertBtn" class="hidden">Convert to PDF</button>
    <button id="downloadBtn" class="hidden">Download PDF</button>

    <p id="status" class="info">Waiting for images…</p>

    <div style="margin-top:12px;">
      <a href="index.html">⬅ Back to Home</a>
    </div>

  </div>
</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
  100% client-side · Files never leave your device
</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const { jsPDF } = window.jspdf;

const input = document.getElementById("input");
const preview = document.getElementById("preview");
const status = document.getElementById("status");
const pickBtn = document.getElementById("pickBtn");
const convertBtn = document.getElementById("convertBtn");
const downloadBtn = document.getElementById("downloadBtn");

let files = [];
let pdfBlob = null;

pickBtn.addEventListener("click", () => input.click());

input.addEventListener("change", () => {
  files = Array.from(input.files);
  render();
  convertBtn.classList.remove("hidden");
  downloadBtn.classList.add("hidden");
  status.innerText = "⬆️⬇️ Use arrows to change order";
  status.classList.remove("success");
});

function render() {
  preview.innerHTML = "";

  files.forEach((file, index) => {
    const row = document.createElement("div");
    row.className = "preview-item";

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    const controls = document.createElement("div");
    controls.className = "controls";

    const up = document.createElement("button");
    up.textContent = "⬆️";
    up.disabled = index === 0;
    up.addEventListener("click", () => moveUp(index));

    const down = document.createElement("button");
    down.textContent = "⬇️";
    down.disabled = index === files.length - 1;
    down.addEventListener("click", () => moveDown(index));

    controls.appendChild(up);
    controls.appendChild(down);

    row.appendChild(img);
    row.appendChild(controls);
    preview.appendChild(row);
  });
}

function moveUp(i) {
  if (i === 0) return;
  [files[i - 1], files[i]] = [files[i], files[i - 1]];
  render();
}

function moveDown(i) {
  if (i === files.length - 1) return;
  [files[i + 1], files[i]] = [files[i], files[i + 1]];
  render();
}

convertBtn.addEventListener("click", async () => {
  if (!files.length) {
    status.innerText = "⚠️ Please select at least one image.";
    return;
  }

  status.innerText = "🔄 Converting…";

  let pdf = null;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const img = await read(file);
    const imageType = getImageType(file);
    const tempPdf = new jsPDF();
    const props = tempPdf.getImageProperties(img);
    const orientation = props.width >= props.height ? "landscape" : "portrait";

    if (!pdf) {
      pdf = new jsPDF({
        orientation,
        unit: "mm",
        format: "a4",
      });
    } else {
      pdf.addPage("a4", orientation);
    }

    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const { width, height, x, y } = fitImageToPage(props.width, props.height, pageWidth, pageHeight);

    pdf.addImage(img, imageType, x, y, width, height);
  }

  if (!pdf) {
    status.innerText = "⚠️ Could not create PDF.";
    return;
  }

  pdfBlob = pdf.output("blob");
  status.innerText = "✅ Completed!";
  status.classList.add("success");
  downloadBtn.classList.remove("hidden");
});

downloadBtn.addEventListener("click", () => {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(pdfBlob);
  a.download = "images-to-pdf.pdf";
  a.click();
});

function read(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}


function fitImageToPage(imgWidth, imgHeight, pageWidth, pageHeight) {
  const scale = Math.min(pageWidth / imgWidth, pageHeight / imgHeight);
  const width = imgWidth * scale;
  const height = imgHeight * scale;

  return {
    width,
    height,
    x: (pageWidth - width) / 2,
    y: (pageHeight - height) / 2,
  };
}

function getImageType(file) {
  if (file.type === "image/png") return "PNG";
  return "JPEG";
}
</script>

</body>
</html>
